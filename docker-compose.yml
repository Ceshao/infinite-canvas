services:
  app:
    image: ghcr.io/basketikun/infinite-canvas:latest
    container_name: infinite-canvas
    ports:
      - "3000:3000"
    restart: unless-stopped
    # 服务端代理模式（可选）：三个变量齐备时开启，访客凭访问码免配置使用。
    # 任一缺失则应用行为与原版一致（浏览器直连、用户自配置）。
    # environment:
    #   AI_PROXY_UPSTREAM_BASE_URL: http://new-api:3000   # New API 内网地址
    #   AI_PROXY_API_KEY: sk-xxxx                          # New API 真密钥（不会下发到浏览器）
    #   AI_PROXY_ACCESS_CODES: alice-x7k2,bob-m9q4         # 首次启动时导入的种子访问码（之后用 /admin 管理）
    #   AI_PROXY_ADMIN_PASSWORD: your-admin-password       # 设置后可用 /admin 网页管理访问码
    #   AI_PROXY_ASYNC_IMAGE_MODELS: nano-pro,nano-2       # 走异步任务链路的图像模型（可选）
    #   AI_PROXY_GEMINI_MODELS: gemini-3-pro-image-preview # 走 Gemini 原生格式的模型（可选，生成第二个服务器渠道）
    # volumes:
    #   - canvas-data:/data                                # 访问码与用量数据持久化
    # 若 New API 在同一 docker 网络，取消注释接入（网络名按实际填写）：
    # networks:
    #   - new-api-network

# volumes:
#   canvas-data:

# networks:
#   new-api-network:
#     external: true
